name: Deploy website

on:
  push:
    branches: [documentation]
  workflow_dispatch:

permissions:
  contents: read

env:
  ASTRO_TELEMETRY_DISABLED: 1

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Copy canonical documentation
        run: |
          rm -rf site/src/content/docs
          mkdir -p site/src/content/docs
          cp docs/*.md site/src/content/docs/
      - name: Build Astro Starlight site
        working-directory: site
        run: npm run build
      - name: Publish organization site
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: unive-alvie/unive-alvie.github.io
          publish_branch: gh-pages
          publish_dir: site/dist
          force_orphan: true
