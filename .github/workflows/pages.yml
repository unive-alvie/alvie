name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ASTRO_TELEMETRY_DISABLED: 1

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Copy canonical documentation
        run: |
          rm -rf site/src/content/docs
          mkdir -p site/src/content/docs
          cp -R docs/. site/src/content/docs/
      - name: Build Astro Starlight site
        working-directory: site
        run: npm run build
      - name: Publish organization site
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: unive-alvie/unive-alvie.github.io
          publish_branch: gh-pages
          publish_dir: site/dist
          force_orphan: true
      - name: Configure project Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload project site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - name: Deploy project site
        id: deployment
        uses: actions/deploy-pages@v4
